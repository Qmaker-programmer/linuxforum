<!DOCTYPE html>
<html lang="es">
{{template "head" .}}
<body class="{{.Theme}}">

    {{template "upbar" .}}

    <style>
        .delete-container {
            max-width: 500px;
            margin: 40px auto;
            padding: 0 15px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
        }

        .delete-card {
            background: #fff;
            border: 1px solid #d9534f;
            border-radius: 8px;
            padding: 30px;
        }

        .delete-card h2 {
            margin-top: 0;
            color: #d9534f;
        }

        .delete-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        .delete-form button {
            padding: 12px;
            background: #d9534f;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
            font-size: 1em;
        }

        .delete-form button:hover {
            background: #c9302c;
        }
    </style>

    <div class="delete-container">

        <a class="back-link" href="/">&lt;- Volver al inicio</a>

        <div class="delete-card">
            <h2>Eliminar cuenta</h2>
            <p style="font-size: 0.9em;">
                Estás a punto de eliminar la cuenta <strong>{{.Username}}</strong>.
            </p>
            <p style="color: #d9534f; font-size: 0.9em; font-weight: bold;">
                Esta acción es irreversible. Todos tus posts serán eliminados y tus comentarios marcados como eliminados.
            </p>

            <form action="/confirm-deletion" method="POST" class="delete-form">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <input type="hidden" name="token" value="{{.Token}}">
                <button type="submit">Confirmar eliminación definitiva</button>
            </form>
        </div>

    </div>

</body>
</html>

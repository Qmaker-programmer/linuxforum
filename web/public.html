<!DOCTYPE html>
<html lang="es">
{{template "head" .}}
<body class="{{.Theme}}">

    {{template "upbar" .}}

    <a href="/">&lt;- Volver al inicio</a>
    <h3>Publicar una nueva discusión</h3>
    
    <form action="/post" method="POST">
        <input type="text" name="title" placeholder="Título de la publicación" required><br><br>
        <textarea name="message" placeholder="Contenido de tu publicación" rows="5" required></textarea><br><br>
        <button type="submit">Publicar</button>
    </form>
</body>
</html>

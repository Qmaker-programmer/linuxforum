<!DOCTYPE html>
<html lang="es">
{{template "head" .}}
<body class="{{.Theme}}">

    {{template "upbar" .}}

    <a href="/view?id={{.Post.ID}}">&lt;- Volver al post</a>

    <h2>Confirmar eliminación</h2>
    <p>Para eliminar el post "<strong>{{.Post.Title}}</strong>", escribe el título exacto:</p>

    {{if .Error}}
        <p style="color:red"><strong>{{.Error}}</strong></p>
    {{end}}

    <form action="/confirm" method="POST">
        <input type="hidden" name="post_id" value="{{.Post.ID}}">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <input type="text" name="title" placeholder="Escribe el título del post" required>
        <br><br>
        <button type="submit">Eliminar post</button>
    </form>

    <br>
    <a href="/view?id={{.Post.ID}}">Cancelar</a>

</body>
</html>

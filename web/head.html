{{define "head"}}
<head>
    <meta charset="UTF-8">
    <title>Linux Forum</title>
    <link rel="icon" type="image/png" href="/web/tux.png">
    <link rel="stylesheet" href="/web/style.css">
    <script>
        // Única excepción a la filosofía "sin JS" del sitio: recuerda la
        // posición de scroll exacta de cada página (por sesión) y la
        // restaura al volver. Sin JS, los enlaces "volver a" del upbar y
        // de cada post siguen funcionando igual, solo que sin este ajuste
        // fino (se apoyan en anclas #post-N como mejor esfuerzo).
        (function () {
            try {
                var key = "scrollpos:" + location.pathname + location.search;
                var saved = sessionStorage.getItem(key);
                if (saved !== null && !location.hash) {
                    window.scrollTo(0, parseInt(saved, 10) || 0);
                }
                window.addEventListener("beforeunload", function () {
                    sessionStorage.setItem(key, String(window.scrollY));
                });
            } catch (e) {
                // sessionStorage no disponible (modo privado, etc.): sin restauración.
            }
        })();
    </script>
</head>
{{end}}

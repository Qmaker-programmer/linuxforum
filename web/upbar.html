{{define "upbar"}}
    <style>
        .upbar-container {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            padding: 15px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* Fila del logo y sesión */
        .upbar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .upbar-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .upbar-brand h2 {
            margin: 0;
            font-size: 1.8em;
        }
        .upbar-user-zone {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.95em;
        }
        .upbar-user-zone p {
            margin: 0;
        }

        /* Fila de navegación y buscadores */
        .upbar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: bold;
        }
        .nav-links a {
            text-decoration: none;
        }
        
        /* Contenedor de las cajas de búsqueda */
        .nav-search-box {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .search-inline {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .search-inline input {
            padding: 4px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .search-inline button {
            padding: 4px 10px;
            border: 1px solid #ccc;
            background: #f5f5f5;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .search-inline button:hover {
            background: #e5e5e5;
        }

        /* Botón de tema clásico */
        .theme-btn {
            padding: 4px 10px;
            border: 1px solid #ccc;
            background: #f0f0f0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .theme-btn:hover {
            background: #e0e0e0;
        }

        /* Ajustes responsivos para móviles */
        @media (max-width: 768px) {
            .upbar-header, .upbar-nav, .nav-search-box {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .upbar-user-zone {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>

    <div class="upbar-container">
        
        <header class="upbar-header">
            <div class="upbar-brand">
                <a href="/"><img src="/web/tux.png" alt="tux" width="60"></a>
                <h2>Linux Forums</h2>
            </div>
            
            <div class="upbar-user-zone">
                {{if .LoggedUser}}
                    <p>Hola, <a href="/user?u={{.LoggedUser}}"><strong>{{.LoggedUser}}</strong></a></p>
                    <a href="/logout" style="color: #d9534f;">Cerrar sesión</a>
                {{else}}
                    <a href="/web/login.html"><strong>Iniciar sesión &rarr;</strong></a>
                {{end}}

                <form action="/theme" method="GET" style="margin: 0;">
                    <input type="hidden" name="mode" value="{{if eq .Theme "dark"}}light{{else}}dark{{end}}">
                    <button type="submit" class="theme-btn">
                        {{if eq .Theme "dark"}}Modo claro{{else}}Modo oscuro{{end}}
                    </button>
                </form>
            </div>
        </header>

        <nav class="upbar-nav">
            <div class="nav-links">
                <a href="/">&bull; Inicio</a>
                {{if .LoggedUser}}
                    <a href="/web/public.html" style="color: green;">&bull; Publicar algo</a>
                {{end}}
            </div>

            <div class="nav-search-box">
                <form action="/search" method="GET" class="search-inline">
                    <input type="text" name="query" placeholder="Buscar publicación..." value="{{.Query}}" required>
                    <button type="submit">Buscar Post</button>
                </form>

                <form action="/search" method="GET" class="search-inline">
                    <input type="text" name="user" placeholder="Buscar usuario..." required>
                    <button type="submit">Buscar User</button>
                </form>
            </div>
        </nav>

    </div>
{{end}}
